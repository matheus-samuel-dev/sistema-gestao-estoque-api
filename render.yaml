services:
  - type: web
    name: stock-management-api
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/stock-management-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JPA_DDL_AUTO
        value: update
      - key: JPA_SHOW_SQL
        value: false
      - key: SECURITY_LOG_LEVEL
        value: INFO
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:*,https://seu-frontend.vercel.app
