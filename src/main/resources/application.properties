spring.application.name=stock-management

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/stock_management}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:5173/reset-password}

server.port=${PORT:8080}

server.forward-headers-strategy=framework
